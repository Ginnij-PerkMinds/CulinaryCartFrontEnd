<header class="app-header">
  <!-- Left Logo -->
  <div class="logo-container">
    <img src="assets/images/Culinary.png" alt="Culinary Cart Logo" class="logo" />
  </div>

  <!-- Centered Title -->
  <h1 class="brand-title">Culinary Cart Restaurant</h1>

  <!-- Right Controls -->
  <div class="header-controls">
    <!-- Cart button with badge (only after login) -->
    <button class="cart-btn" *ngIf="authService.isLoggedIn()" (click)="cart.openCart()">
      🛒 Cart
      <span class="cart-badge" *ngIf="cart.itemCount > 0">{{ cart.itemCount }}</span>
    </button>

     <!-- ✅ Added: popup notification near cart button -->
    <div class="cart-popup-notification" *ngIf="cartNotification">
      {{ cartNotification }}
    </div>

  <!-- Right Corner Dropdown -->
  <div class="dropdown" *ngIf="!authService.isLoggedIn()">
    <button class="dropbtn">
      <img src="assets/images/dropdown.png" alt="Dropdown Icon" class="drop-icon" />
    </button>
    <div class="dropdown-content">
      <a routerLink="/signup">Signup</a>
      <a routerLink="/login">Login</a>
    </div>
  </div>

  <!-- Show only Logout after login -->
  <div class="dropdown" *ngIf="authService.isLoggedIn()">
    <button class="dropbtn">
      <img src="assets/images/dropdown.png" alt="Dropdown Icon" class="drop-icon" />
    </button>
    <div class="dropdown-content">
      <a (click)="authService.logout()">Logout</a>
    </div>
  </div>


<!-- ✅ Keep cart component reference -->
<app-cart #cart></app-cart>
