 <app-header></app-header>

<section class="hero-section text-white py-1">
  <div class="container">
    <!-- Tagline -->
    <div class="tagline text-center mb-5 mt-5">
      <h1 class="fw-bold mb-2">Order Food. Discover best cuisines.</h1>
      <h2 class="fw-bold">Culinary it!</h2>
    </div>

    <!-- Search Bars -->
    <div class="search-bars d-flex justify-content-center flex-wrap gap-4 mb-5">
      <div class="input-group location-input">
        <span class="input-group-text"><i class="bi bi-geo-alt-fill"></i></span>
        <input type="text" class="form-control" placeholder="Enter your delivery location">
      </div>
      <div class="input-group search-input">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control" placeholder="Search for items and more">
      </div>
    </div>

    <!-- Service Cards Side by Side -->
    <div class="row justify-content-center g-4">
      <!-- Food Delivery -->
      <div class="col-md-4">
        <div class="card service-card text-dark position-relative">
          <span class="offer-badge">UPTO 60% OFF</span>
          <img src="assets/images/fooddelivery.png" class="card-img-top" alt="Food Delivery">
          <div class="card-body text-center">
            <h5 class="fw-bold">FOOD DELIVERY</h5>
            <p>FRESH FROM OUR KITCHEN</p>
            <button class="btn btn-primary fw-bold mt-2"
              data-bs-toggle="offcanvas"
              data-bs-target="#signinOffcanvas">
        Order Now
      </button>
          </div>
        </div>
      </div>

      <!-- Dineout -->
      <div class="col-md-4">
        <div class="card service-card text-dark position-relative">
          <span class="offer-badge">UPTO 50% OFF</span>
          <img src="assets/images/dineout.jpg" class="card-img-top" alt="Dineout">
          <div class="card-body text-center">
            <h5 class="fw-bold">DINEOUT</h5>
            <p>EAT OUT & SAVE MORE</p>
            <button class="btn btn-success fw-bold mt-2"
              data-bs-toggle="offcanvas"
              data-bs-target="#signinOffcanvas">
        Book Now
      </button>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- Offcanvas Signin Modal -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="signinOffcanvas">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title"></h5>
    <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <!-- Angular Login Component -->
    <app-login></app-login>
  </div>
</div>

<!-- Offcanvas Signup Modal -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="signupOffcanvas">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title"></h5>
    <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body">
    <!-- Angular Signup Component -->
    <app-signup></app-signup>
  </div>
</div>
