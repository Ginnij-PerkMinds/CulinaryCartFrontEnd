    <!--Signin OffCanvas-->
    <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="login-form p-4 rounded bg-light shadow-sm">
      <h2 class="text-center mb-4">Sign in to Culinary Cart</h2>

      <!-- Email -->
      <div class="mb-3">
        <input type="email" class="form-control"
               [(ngModel)]="email" name="email" required
               placeholder="Enter your email"
               [ngClass]="{'is-invalid': loginForm.controls['email']?.invalid && loginForm.controls['email']?.touched}" />
        <div class="invalid-feedback">Please enter a registered email.</div>
      </div>

      <!-- Password -->
      <div class="mb-3 position-relative">
        <input [type]="showPassword ? 'text' : 'password'" class="form-control"
               [(ngModel)]="password" name="password" required minlength="8"
               placeholder="Enter your password"
               [ngClass]="{'is-invalid': loginForm.controls['password']?.invalid && loginForm.controls['password']?.touched}" />
        <span class="toggle-password position-absolute top-50 end-0 translate-middle-y me-3"
              (click)="togglePassword()">👁️</span>
        <div class="invalid-feedback">Password must be at least 8 characters.</div>
      </div>

      <!-- Alerts -->
      <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
      <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

      <!-- Submit -->
      <button type="submit" class="btn btn-success w-100"
              [disabled]="loginForm.invalid || isLoading">
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>

      <!-- Signup Link -->
      <div class="mt-3 text-center signup-link">
        <p>Don’t have an account?
          <button type="button"
          class="btn btn-link p-0"
          data-bs-toggle="offcanvas"
          data-bs-target="#signupOffcanvas">
    Sign up here
  </button>
        </p>
      </div>
    </form>

    <!-- Social Icons -->
    <div class="social-icons mt-4 text-center">
      <a href="https://facebook.com" target="_blank" class="mx-2"><i class="fab fa-facebook-f"></i></a>
      <a href="https://instagram.com" target="_blank" class="mx-2"><i class="fab fa-instagram"></i></a>
      <a href="https://twitter.com" target="_blank" class="mx-2"><i class="fab fa-twitter"></i></a>
    </div>
