<!-- Signup Offcanvas -->
    <form (ngSubmit)="onSignup()" #signupForm="ngForm" class="signup-form p-4 rounded shadow-sm bg-light">
      <h2 class="text-center mb-4">Create your account</h2>

      <!-- Name -->
      <div class="mb-3">
        <input type="text" class="form-control" id="name" name="name"
               [(ngModel)]="name" required placeholder="Enter your full name"
               #nameRef="ngModel">
        <div class="invalid-feedback d-block" *ngIf="nameRef.invalid && nameRef.touched">
          Full Name is required.
        </div>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <input type="email" class="form-control" id="email" name="email"
               [(ngModel)]="email" required placeholder="Enter your email"
               #emailRef="ngModel">
        <div class="invalid-feedback d-block" *ngIf="emailRef.invalid && emailRef.touched">
          Please enter a valid email.
        </div>
      </div>

      <!-- Password -->
      <div class="mb-3 position-relative">
        <input [type]="showPassword ? 'text' : 'password'" class="form-control" id="password" name="password"
               [(ngModel)]="password" required minlength="8" placeholder="Choose a strong password"
               #passwordRef="ngModel">
        <span class="toggle-password position-absolute top-50 end-0 translate-middle-y me-3"
              (click)="togglePassword()">👁️</span>
        <div class="invalid-feedback d-block" *ngIf="passwordRef.invalid && passwordRef.touched">
          Password must be at least 8 characters.
        </div>
      </div>

      <!-- Alerts -->
      <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
      <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

      <!-- Submit -->
      <button type="submit" class="btn btn-danger w-100 fw-bold"
              [disabled]="signupForm.invalid || isLoading">
        {{ isLoading ? 'Signing up...' : 'Sign Up' }}
      </button>

      <!-- Signin Link -->
      <div class="mt-3 text-center">
        <p>Already have an account?
          <button type="button"
          class="btn btn-link p-0"
          data-bs-toggle="offcanvas"
          data-bs-target="#signinOffcanvas">
    Sign in here
  </button>
        </p>
      </div>
    </form>

    <!-- Social Icons -->
    <div class="social-icons mt-4 text-center">
      <a href="https://facebook.com" target="_blank" class="mx-2"><i class="fab fa-facebook-f"></i></a>
      <a href="https://instagram.com" target="_blank" class="mx-2"><i class="fab fa-instagram"></i></a>
      <a href="https://twitter.com" target="_blank" class="mx-2"><i class="fab fa-twitter"></i></a>
    </div>
