<header class="app-header">
  <h1>Culinary Cart Restaurant</h1>
  <h2>Menu</h2>
</header>

<div class="menu-grid">
  <div class="menu-card" *ngFor="let item of menuItems">
    <h3>{{ item.foodItemName }}</h3>
    <p>{{ item.offers }}</p>
    <span>{{ item.price | currency:'INR' }}</span>
    <small>{{ item.categoryName }} | {{ item.dietaryPreferenceName }}</small>
    <img [src]="'http://localhost:5209' + item.imageUrl" alt="{{ item.foodItemName }}" />
  </div>
</div>
