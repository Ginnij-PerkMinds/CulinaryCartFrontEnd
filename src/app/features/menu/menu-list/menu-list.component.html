<app-header></app-header>

<div class="menu-layout">
  <!-- Sidebar filters -->
  <aside class="filters-sidebar">
    <div class="filter-section">
      <h3>Category</h3>
      <div *ngFor="let cat of categories">
        <label>
          <input type="checkbox" [value]="cat.categoryName" (change)="onCategoryChange($event)">
          {{cat.categoryName}}
        </label>
      </div>
    </div>

    <div class="filter-section">
      <h3>Dietary Preferences</h3>
      <div *ngFor="let diet of dietaryPreferences">
        <label>
          <input type="checkbox" [value]="diet.diet" (change)="onDietChange($event)">
          {{diet.diet}}
        </label>
      </div>
    </div>
  </aside>

  <!-- Scrollable menu grid -->
  <section class="menu-grid">
    <div class="menu-card" *ngFor="let item of menuItems">
      <h3>{{ item.foodItemName }}</h3>
      <p>{{ item.offers }}</p>
      
      <small>{{ item.categoryName }} | {{ item.dietaryPreferenceName }}</small>
      <img [src]="'http://localhost:5209' + item.imageUrl" alt="{{ item.foodItemName }}" />

      <span>{{ item.price | currency:'INR' }}</span>

      <div class="cart-controls">
        <button class="qty-btn" (click)="decreaseQuantity(item)">-</button>
        <span class="qty-display">{{ item.quantity }}</span>
        <button class="qty-btn" (click)="increaseQuantity(item)">+</button>
        <button class="add-btn" (click)="addToCart(item)">Add to Cart</button>
      </div>
    </div>
  </section>
</div>


<app-footer></app-footer>
