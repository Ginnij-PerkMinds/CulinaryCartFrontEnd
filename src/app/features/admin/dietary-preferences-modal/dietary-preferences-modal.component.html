<div #dietaryModal class="modal fade" id="dietaryModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content border-blood-orange bg-soft-peach">
      
      <!-- Header -->
      <div class="modal-header bg-blood-orange text-white">
        <h5 class="modal-title">Manage Dietary Preferences</h5>
        <button type="button" class="btn-close btn-close-white" (click)="closeModal()"></button>
      </div>

      <!-- Body -->
      <div class="modal-body">
        <table class="table table-striped table-hover">
          <thead class="table-blood-orange text-white">
            <tr>
              <th>Name</th>
              <th style="width:120px;">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let pref of dietaryPreferences">
              <td>
                <span *ngIf="editingDietId !== pref.id">{{ pref.name }}</span>
                <input *ngIf="editingDietId === pref.id"
                       [(ngModel)]="editingDietName"
                       class="form-control form-control-sm"/>
              </td>
              <td>
                <button *ngIf="editingDietId !== pref.id"
                        class="btn btn-sm btn-outline-primary me-1"
                        (click)="startEdit(pref)">
                  <i class="bi bi-pencil"></i>
                </button>
                <button *ngIf="editingDietId === pref.id"
                        class="btn btn-sm btn-success me-1"
                        (click)="saveEdit()">
                  <i class="bi bi-check-lg"></i>
                </button>
                <button *ngIf="editingDietId === pref.id"
                        class="btn btn-sm btn-secondary me-1"
                        (click)="cancelEdit()">
                  <i class="bi bi-x-lg"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger"
                        (click)="deleteDietaryPreference(pref.id)">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>

        <!-- Add new dietary preference -->
        <div class="card mt-3 border-blood-orange">
          <div class="card-body">
            <input type="text" [(ngModel)]="newDietName"
                   placeholder="New dietary preference"
                   class="form-control mb-2"/>
            <button class="btn btn-blood-orange w-100" (click)="addDietaryPreference()">Add Dietary Preference</button>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="modal-footer bg-soft-peach">
        <button type="button" class="btn btn-secondary" (click)="closeModal()">Cancel</button>
      </div>
    </div>
  </div>
</div>
