<div class="modal fade" id="dietModal" tabindex="-1" aria-labelledby="dietModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title fw-bold text-blood-orange" id="dietModalLabel">Manage Dietary Preferences</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <ul class="list-group mb-3">
          <li *ngFor="let diet of dietaryPreferences" class="list-group-item d-flex justify-content-between align-items-center">
            <div *ngIf="editingDietId !== diet.id; else editForm">
              {{ diet.name }}
            </div>
            <ng-template #editForm>
              <input type="text" [(ngModel)]="editingDietName" class="form-control form-control-sm me-2">
            </ng-template>

            <div class="btn-group">
              <button *ngIf="editingDietId !== diet.id" class="btn btn-sm btn-outline-primary" (click)="startEdit(diet)">
                <i class="bi bi-pencil"></i>
              </button>
              <button *ngIf="editingDietId === diet.id" class="btn btn-sm btn-success" (click)="saveEdit()">
                <i class="bi bi-check-lg"></i>
              </button>
              <button *ngIf="editingDietId === diet.id" class="btn btn-sm btn-secondary" (click)="cancelEdit()">
                <i class="bi bi-x-lg"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger" (click)="deleteDiet(diet.id)">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </li>

          <li class="list-group-item">
            <input type="text" [(ngModel)]="newDietName" placeholder="New dietary preference" class="form-control mb-2">
            <button class="btn btn-blood-orange w-100" (click)="addDiet()">Add Dietary Preference</button>
          </li>
        </ul>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>

    </div>
  </div>
</div>
