<div class="modal fade" id="addMenuModal" tabindex="-1" aria-labelledby="addMenuModalLabel" aria-hidden="true" #addMenuModal>
  <div class="modal-dialog modal-lg">
    <div class="modal-content rounded-4 shadow-lg">

      <!-- Header -->
      <div class="modal-header bg-danger ">
        <h5 class="modal-title fw-bold px-3 py-2 rounded text-white" id="addMenuModalLabel">
          Add Culinary Item
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <!-- Body -->
      <div class="modal-body">
        <form [formGroup]="addMenuForm" (ngSubmit)="onSubmit()">
          <div class="p-4 border rounded shadow-sm bg-light">

            <!-- Food Name -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Food Item Name</label>
              <input type="text" class="form-control" formControlName="foodItemName" required>
            </div>

            <!-- Price -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Price</label>
              <input type="number" class="form-control" formControlName="price" required>
            </div>

            <!-- Offers -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Offers</label>
              <input type="text" class="form-control" formControlName="offers">
            </div>

            <!-- Category -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Category</label>
              <select class="form-select" formControlName="categoryName">
                <option value="">-- Select Category --</option>
                <option *ngFor="let cat of categories" [value]="cat.categoryName">{{ cat.categoryName }}</option>
              </select>
            </div>

            <!-- Diet -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Dietary Preference</label>
              <select class="form-select" formControlName="dietaryPreferenceName">
                <option value="">-- Select Diet --</option>
                <option *ngFor="let diet of dietaryPreferences" [value]="diet.diet">{{ diet.diet }}</option>
              </select>
            </div>

            <!-- Image Upload -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Image</label>
              <input type="file" class="form-control" (change)="onFileSelected($event)">
            </div>
          </div>

          <!-- Footer -->
          <div class="modal-footer border-top pt-3 d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary px-4">Save Item</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
