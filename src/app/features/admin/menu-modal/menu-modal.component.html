<div class="modal fade" id="menuModal" tabindex="-1" aria-labelledby="menuModalLabel" aria-hidden="true" #menuModal>
  <div class="modal-dialog modal-lg">
    <div class="modal-content rounded-4 shadow-lg">

      <!-- Header -->
      <div class="modal-header bg-danger ">
        <h5 class="modal-title fw-bold px-3 py-2 rounded text-white" id="addMenuModalLabel">
          {{ isEditMode ? 'Update Culinary Item' : 'Add Culinary Item' }}
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <!-- Body -->
      <div class="modal-body">
        <form [formGroup]="menuForm" (ngSubmit)="onSubmit()">
          <div class="p-4 border rounded shadow-sm bg-light">

            <!-- Food Name -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Food Item Name</label>
              <input type="text" class="form-control" formControlName="foodItemName" required>
            </div>

            <!-- Price -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Price</label>
              <input type="number" class="form-control" formControlName="price" required>
            </div>

            <!-- Offers -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Offers</label>
              <input type="text" class="form-control" formControlName="offers">
            </div>

            <!-- Category -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Category</label>
              <select class="form-select" formControlName="categoryName">
                <option value="">-- Select Category --</option>
                <option *ngFor="let cat of categories" [value]="cat.categoryName">{{ cat.categoryName }}</option>
              </select>
            </div>

            <!-- Diet -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Dietary Preference</label>
              <select class="form-select" formControlName="dietaryPreferenceName">
                <option value="">-- Select Diet --</option>
                <option *ngFor="let diet of dietaryPreferences" [value]="diet.diet">{{ diet.diet }}</option>
              </select>
            </div>
            <!-- In Stock Toggle -->
            <div class="mb-3 form-check form-switch">
            <input type="checkbox" class="form-check-input" formControlName="inStock" id="inStockSwitch">
            <label class="form-check-label fw-semibold" for="inStockSwitch">In Stock</label>
            </div>

            <!-- Image Upload -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Image</label>
              <input type="file" class="form-control" (change)="onFileSelected($event)" accept="image/*">

              <!-- Preview -->
              <div class="mt-3 text-center" *ngIf="previewUrl">
                <img [src]="previewUrl" alt="Preview"
                     class="img-thumbnail shadow-sm"
                     style="max-width: 200px; height: auto;">
              </div>
            </div>
          </div>

          <!-- Footer -->
          <div class="modal-footer border-top pt-3 d-flex justify-content-end gap-2">
            <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary px-4">
             {{ isEditMode ? 'Update Item' : 'Save Item' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Toast Notification Container -->
<div class="toast-container position-fixed top-0 end-0 p-3">
  <div *ngIf="notification" class="toast show align-items-center text-bg-light border-0"
       role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body">
        {{ notification }}
      </div>
    </div>
  </div>
</div>
