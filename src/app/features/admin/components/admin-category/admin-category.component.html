<div class="container mt-4 category-page">
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Manage Categories</h3>
  <button class="btn btn-blood-orange rounded-circle"
          data-bs-toggle="modal" data-bs-target="#addCategoryModal"
          style="width:40px; height:40px; font-size:20px; line-height:1;">
    +
  </button>
</div>




<!-- Modal -->
<div class="modal fade" id="addCategoryModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content border-blood-orange">
      <div class="modal-header bg-blood-orange text-white">
        <h5 class="modal-title">Add New Category</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body bg-soft-peach">
        <input type="text" [(ngModel)]="newCategoryName"
               placeholder="New category"
               class="form-control mb-2"/>
        <button class="btn btn-blood-orange w-100" (click)="addCategory()">Add Category</button>
      </div>
    </div>
  </div>
</div>

  <!-- Categories Table -->
  <table class="table table-striped table-hover category-table">
    <thead>
      <tr>
        <th>Name</th>
        <th style="width:120px;">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let cat of categories">
        <td>
          <span *ngIf="editingCategoryId !== cat.categoryId">{{ cat.categoryName }}</span>
          <input *ngIf="editingCategoryId === cat.categoryId"
                 [(ngModel)]="editingCategoryName"
                 class="form-control form-control-sm"/>
        </td>
        <td>
          <button *ngIf="editingCategoryId !== cat.categoryId"
                  class="btn btn-sm btn-outline-primary me-1"
                  (click)="startEdit(cat)">
            <i class="bi bi-pencil"></i>
          </button>
          <button *ngIf="editingCategoryId === cat.categoryId"
                  class="btn btn-sm btn-success me-1"
                  (click)="saveEdit()">
            <i class="bi bi-check-lg"></i>
          </button>
          <button *ngIf="editingCategoryId === cat.categoryId"
                  class="btn btn-sm btn-secondary me-1"
                  (click)="cancelEdit()">
            <i class="bi bi-x-lg"></i>
          </button>
          <button class="btn btn-sm btn-outline-danger"
                  (click)="deleteCategory(cat.categoryId)">
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>
    </tbody>
  </table>


  <!-- Notification Banner -->
  <div *ngIf="notification"
       class="alert global-notification"
       [ngClass]="{
         'alert-success': (notification | lowercase).includes('success'),
         'alert-danger': (notification | lowercase).includes('error'),
         'alert-info': !(notification | lowercase).includes('success') && !(notification | lowercase).includes('error')
       }"
       role="alert">
    {{ notification }}
  </div>
