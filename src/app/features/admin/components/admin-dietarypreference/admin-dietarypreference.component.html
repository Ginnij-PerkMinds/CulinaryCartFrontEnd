<div class="container mt-4 dietary-page">
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Manage Dietary preferences</h3>
  <button class="btn btn-blood-orange rounded-circle"
          data-bs-toggle="modal" data-bs-target="#adddietaryModal"
          style="width:40px; height:40px; font-size:20px; line-height:1;">
    +
  </button>
</div>
  <!-- Notification Banner -->
  <div *ngIf="notification" class="notification wrapper">
  <div class="alert mb-0 ms-3 py-1 px-3"
       [ngClass]="{
         'alert-success': (notification | lowercase).includes('success'),
         'alert-danger': (notification | lowercase).includes('error'),
         'alert-info': !(notification | lowercase).includes('success') && !(notification | lowercase).includes('error')
       }"
       role="alert">
    {{ notification }}
  </div>
</div>

  <!-- Modal -->
<div class="modal fade" id="adddietaryModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content border-blood-orange">
      <div class="modal-header bg-blood-orange text-white">
        <h5 class="modal-title">Add New Dietary Preference</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body bg-soft-peach">
        <input type="text" [(ngModel)]="newDietName"
               placeholder="New category"
               class="form-control mb-2"/>
        <button class="btn btn-blood-orange w-100" (click)="addDietaryPreference()">Add Dietary Preference</button>
      </div>
    </div>
  </div>
</div>

  <!-- Table of dietary preferences -->
  <table class="table table-striped table-hover dietary-table">
    <thead>
      <tr>
        <th>Name</th>
        <th style="width:120px;">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let pref of dietaryPreferences">
        <td>
          <span *ngIf="editingPrefId !== pref.dietId">{{ pref.diet }}</span>
          <input *ngIf="editingPrefId === pref.dietId"
                 [(ngModel)]="editingPrefName"
                 class="form-control form-control-sm"/>
        </td>
        <td>
          <button *ngIf="editingPrefId !== pref.dietId"
                  class="btn btn-sm btn-outline-primary me-1"
                  (click)="startEdit(pref)">
            <i class="bi bi-pencil"></i>
          </button>
          <button *ngIf="editingPrefId === pref.dietId"
                  class="btn btn-sm btn-success me-1"
                  (click)="saveEdit()">
            <i class="bi bi-check-lg"></i>
          </button>
          <button *ngIf="editingPrefId === pref.dietId"
                  class="btn btn-sm btn-secondary me-1"
                  (click)="cancelEdit()">
            <i class="bi bi-x-lg"></i>
          </button>
          <button class="btn btn-sm btn-outline-danger"
                  (click)="deleteDietaryPreference(pref.dietId)">
            <i class="bi bi-trash"></i>
          </button>
        </td>
      </tr>
    </tbody>
  </table>
