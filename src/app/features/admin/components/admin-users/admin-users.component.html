<h3></h3>

<div class="table-responsive">
  <table class="table table-bordered table-hover align-middle">
    <thead class="table-light">
      <tr>
        <th>UserId</th>
        <th>Name</th>
        <th>EmailId</th>
        <th>PasswordHash</th>
        <th>CreatedAt</th>
        <th>UpdatedAt</th>
        <th>IsActive</th>
        <th>IsAdmin</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users">
        <td>{{ user.userId }}</td>
        <td>{{ user.name }}</td>
        <td>{{ user.emailId }}</td>
        <td>{{ user.passwordHash }}</td>
        <td>{{ user.createdAt }}</td>
        <td>{{ user.updatedAt }}</td>
        <td>
          <!-- Old Checkbox -->
          <!--
          <input type="checkbox" [checked]="user.isActive" (change)="toggleActive(user)" />
          -->

          <!-- New Toggle Switch -->
          <div class="form-check form-switch">
            <input 
              class="form-check-input" 
              type="checkbox" 
              [checked]="user.isActive" 
              (change)="toggleActive(user)" />
          </div>
        </td>
        <td>
          <!-- Old Checkbox -->
          <!--
          <input type="checkbox" [checked]="user.isAdmin" (change)="toggleAdmin(user)" />
          -->

          <!-- New Toggle Switch -->
          <div class="form-check form-switch">
            <input 
              class="form-check-input" 
              type="checkbox" 
              [checked]="user.isAdmin" 
              (change)="toggleAdmin(user)" />
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
