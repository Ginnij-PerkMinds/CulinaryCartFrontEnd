<div class="table-responsive">
  <table class="table user-table table-bordered table-hover align-middle">
    <thead class="table-header">
      <tr>
        <th>User-Id</th>
        <th>Name</th>
        <th>Email-Id</th>
        <th>Created At</th>
        <th>Updated At</th>
        <th>Is Active</th>
        <th>Is Admin</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users; let i = index"
          [ngClass]="i % 2 === 0 ? 'table-light' : 'table-secondary'">
        <td>{{ user.userId }}</td>
        <td>{{ user.name }}</td>
        <td>{{ user.emailId }}</td>
        <td>{{ user.createdAt | date:'dd/MM/yyyy, hh:mm a' }}</td>
        <td>{{ user.updatedAt | date:'dd/MM/yyyy, hh:mm a' }}</td>
        <td>
          <div class="form-check form-switch">
            <input class="form-check-input"
                   type="checkbox"
                   [checked]="user.isActive"
                   (change)="toggleActive(user)" />
          </div>
        </td>
        <td>
          <div class="form-check form-switch">
            <input class="form-check-input"
                   type="checkbox"
                   [checked]="user.isAdmin"
                   (change)="toggleAdmin(user)" />
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
